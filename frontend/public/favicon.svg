<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <clipPath id="corner">
      <polygon points="0,0 30,0 30,30"/>
      <polygon points="30,30 60,30 60,60"/>
    </clipPath>
  </defs>
  <rect width="60" height="60" rx="8" fill="#012169"/>
  <g clip-path="url(#corner)">
    <path d="M0,0 L60,60" stroke="#FFFFFF" stroke-width="6"/>
    <path d="M60,0 L0,60" stroke="#FFFFFF" stroke-width="6"/>
    <path d="M0,0 L60,60" stroke="#C8102E" stroke-width="2"/>
    <path d="M60,0 L0,60" stroke="#C8102E" stroke-width="2"/>
  </g>
  <path d="M30,0 L30,60" stroke="#FFFFFF" stroke-width="10"/>
  <path d="M0,30 L60,30" stroke="#FFFFFF" stroke-width="10"/>
  <path d="M30,0 L30,60" stroke="#C8102E" stroke-width="5"/>
  <path d="M0,30 L60,30" stroke="#C8102E" stroke-width="5"/>
</svg>
